# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/release.yml
#
# Tag-Based Release Orchestration for npm Package
# ──────────────────────────────────────────────────────────────────────────────
# Trigger: Push a version tag — v1.2.3, v2.0.0-beta.1, etc.
#
# Pipeline (jobs run in dependency order):
#
#   validate ──┬──► ci ──► build ──► github-release ──► publish
#              │
#              └── (gates everything: version files + changelog must be in order)
#
# ──────────────────────────────────────────────────────────────────────────────

name: 🚀 Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # stable:      v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-release: v1.2.3-beta.1

permissions:
  contents: write # required to create GitHub Releases

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a release in progress

# ── PROJECT VARIABLES ─────────────────────────────────────────────────────────
env:
  PROJECT_NAME: "Board Meeting Skill"
  REPO: "${{ github.repository }}"

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Job 1: Validate ─────────────────────────────────────────────────────────
  # Gate that must pass before anything else runs.
  # Checks:
  #   (a) Version in package.json matches tag
  #   (b) CHANGELOG.md has an entry for this version
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for git log in release notes

      # ── Extract version metadata ────────────────────────────────────────────
      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-release tag detected: ${TAG}"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Stable release tag detected: ${TAG}"
          fi

      # ── Check (a): version consistency ─────────────────────────────────────
      - name: Set up Python (for validation scripts)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version consistency
        run: |
          python3 .github/scripts/check-version.py "${{ steps.meta.outputs.tag }}"

      # ── Check (b): changelog entry ─────────────────────────────────────────
      - name: Extract and validate changelog entry
        run: |
          python3 .github/scripts/extract-changelog.py \
            "${{ steps.meta.outputs.version }}" \
            CHANGELOG.md \
            > /tmp/changelog-notes.md

          echo "── Changelog notes for ${{ steps.meta.outputs.version }} ──"
          cat /tmp/changelog-notes.md
          echo "──────────────────────────────────────────────────────────────"

      - name: Upload changelog notes
        uses: actions/upload-artifact@v4
        with:
          name: changelog-notes
          path: /tmp/changelog-notes.md
          retention-days: 1

  # ── Job 2: CI ─────────────────────────────────────────────────────────────
  # Runs the full CI suite by calling the reusable CI workflow.
  # A release will never publish with a broken install script or missing files.
  ci:
    name: Full CI Suite
    needs: validate
    uses: ./.github/workflows/ci.yml

  # ── Job 3: Build ────────────────────────────────────────────────────────────
  # Builds the npm package. Only runs after validate + ci both pass.
  build:
    name: Build npm Package
    runs-on: ubuntu-latest
    needs: [validate, ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: "*.tgz"
          retention-days: 1

  # ── Job 4: GitHub Release ───────────────────────────────────────────────────
  # Assembles the complete release body, creates the GitHub Release, and
  # attaches all build artifacts. This is the trigger for the publish workflow.
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build]

    steps:
      - name: Checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download changelog notes
        uses: actions/download-artifact@v4
        with:
          name: changelog-notes
          path: /tmp/release-assets/

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: /tmp/release-assets/

      # ── Assemble the release body ──────────────────────────────────────────
      - name: Build release body
        id: body
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ needs.validate.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          python3 .github/scripts/build-release-notes.py \
            --version   "${{ needs.validate.outputs.version }}" \
            --repo      "${{ env.REPO }}" \
            --project   "${{ env.PROJECT_NAME }}" \
            --changelog CHANGELOG.md \
            ${PRERELEASE_FLAG} \
            > /tmp/release-body.md

          echo "── Release body preview (first 60 lines) ─────────────────────"
          head -60 /tmp/release-body.md
          echo "──────────────────────────────────────────────────────────────"

          # Write to GITHUB_OUTPUT using a random delimiter to safely handle
          # multi-line content
          DELIMITER=$(openssl rand -hex 16)
          {
            echo "content<<${DELIMITER}"
            cat /tmp/release-body.md
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      # ── Create and publish the GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: "${{ env.PROJECT_NAME }} ${{ needs.validate.outputs.tag }}"
          body: ${{ steps.body.outputs.content }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          draft: false
          make_latest: ${{ needs.validate.outputs.prerelease == 'false' }}
          files: |
            /tmp/release-assets/*.tgz
          fail_on_unmatched_files: false

  # ── Job 5: Publish to npm ─────────────────────────────────────────────────
  # Publishes the package to npm. Runs after github-release succeeds.
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: github-release

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm pack

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
