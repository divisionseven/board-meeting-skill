# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/release.yml
#
# Single-Job Tag-Based Publishing
# ──────────────────────────────────────────────────────────────────────────────
# Trigger: Push a version tag — v1.2.3, v2.0.0-beta.1, etc.
#
# Pipeline (jobs run in dependency order):
#
#   checkout ─► setup ─► npm ci ─► version check ─► build package
#             ─► GitHub release ─► publish to npm
#
# Prerequisites:
#   - Version in package.json must match the tag
#   - CHANGELOG.md must have an entry for this version
#   - All CI tests must pass before tagging (enforced by workflow rules)
#
# ──────────────────────────────────────────────────────────────────────────────

name: 🚀 Publish Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # stable:      v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-release: v1.2.3-beta.1

permissions:
  contents: write # required to create GitHub Releases
  id-token: write # required for npm provenance

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false # never cancel a publish in progress

# ── PROJECT VARIABLES ─────────────────────────────────────────────────────────
env:
  PROJECT_NAME: "board-meeting-skill"
  REPO: "${{ github.repository }}"
  LOGO_LIGHT: "https://raw.githubusercontent.com/divisionseven/board-meeting-skill/main/docs/assets/logo-black.svg"
  LOGO_DARK: "https://raw.githubusercontent.com/divisionseven/board-meeting-skill/main/docs/assets/logo-white.svg"
  LOGO_WIDTH: "500"

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Job: GitHub Release ───────────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout (full history for git log in release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Set up Node.js ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      # ── Set up Python ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Version pre-check ────────────────────────────────────────────────
      # Verify version consistency before building — fail fast if mismatch
      - name: Check version consistency
        run: |
          python3 .github/scripts/check-version.py "${{ github.ref_name }}"

      # ── Build package ─────────────────────────────────────────────────────
      - name: Build package
        run: npm pack

      # ── Create GitHub Release ────────────────────────────────────────
      # Build professional release notes with logo, changelog, and commit history
      - name: Build release body
        id: release-body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Detect pre-release
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          python3 .github/scripts/build-release-notes.py \
            --version     "$VERSION" \
            --repo      "${{ env.REPO }}" \
            --project   "${{ env.PROJECT_NAME }}" \
            --changelog CHANGELOG.md \
            --logo-light "${{ env.LOGO_LIGHT }}" \
            --logo-dark  "${{ env.LOGO_DARK }}" \
            --logo-width "${{ env.LOGO_WIDTH }}" \
            ${PRERELEASE_FLAG} \
            > /tmp/release-body.md

          echo "── Release body preview (first 40 lines) ─────────────────────"
          head -40 /tmp/release-body.md
          echo "──────────────────────────────────────────────────────────"

      - name: Upload package for release
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "*.tgz"
          retention-days: 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ env.PROJECT_NAME }} ${{ github.ref_name }}"
          body_path: /tmp/release-body.md
          draft: false
          make_latest: ${{ !contains(github.ref_name, '-') }}
          files: "*.tgz"
          fail_on_unmatched_files: true

  # ── Job: Publish to npm ─────────────────────────────────────────────────
  # Publishes the package to npm. Runs after github-release succeeds.
  publish:
    name: Publish package to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read # read the repo
      id-token: write # REQUIRED for OIDC trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi
          echo "✓ Tag matches package version: $PKG"

      - name: Publish
        run: npm publish --access public --provenance

      # ── Summary ─────────────────────────────────────────────────
      - name: Publish summary
        run: |
          echo "---"
          echo "✅ Published: ${{ env.PROJECT_NAME }} ${{ github.ref_name }}"
          echo "🔗 GitHub Release: https://github.com/${{ env.REPO }}/releases/tag/${{ github.ref_name }}"
          echo "📦 npm: https://www.npmjs.com/package/${{ env.PROJECT_NAME }}"
          echo "---"
