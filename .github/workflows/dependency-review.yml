name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependency Changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on any vulnerability with CVSS score >= 7.0 (High or Critical)
          fail-on-severity: high
          # Comment on the PR with a summary of findings
          comment-summary-in-pr: always
          # Deny known-malicious packages
          deny-licenses: GPL-3.0, AGPL-3.0
          # Allow pre-approved licenses
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, PSF-2.0
