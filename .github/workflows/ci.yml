# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
#
# Continuous Integration for Board Meeting Skill
# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push to main
#   • Pull requests targeting main
#
# Jobs:
#   lint    → check JavaScript syntax and formatting
#   test    → run the test suite
#
# ──────────────────────────────────────────────────────────────────────────────

name: ♻️ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref (saves minutes on rapid pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint / Format Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint || echo "No lint script configured"

      - name: Check formatting (Prettier)
        run: npm run format:check || echo "No format:check script configured"

  # ── Test Suite ───────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - "18"
          - "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: node tests/suite.js
